server:
  host: "0.0.0.0"
  port: 8000
  storage_path: "./storage"
  frontend_dist: "../frontend/dist"

# Booth identity — used to namespace R2 object keys in the shared bucket
# so videos from each geographically separated booth land under a distinct prefix.
booth:
  id: 1
  name: "performance"

session:
  counter_file: "./storage/counter.json"

# ──────────────────────────────────────────────────────
# Video format configurations
# Fill in exact specs when provided.
# music_file: filename inside storage/music/ (null = no music)
# music_start_offset: seconds into the track to begin playback
# ──────────────────────────────────────────────────────
formats:
  - id: 1
    label: "챌린지 1"
    duration_seconds: 30
    music_file: null
    music_start_offset: 0

  - id: 2
    label: "챌린지 2"
    duration_seconds: 30
    music_file: null
    music_start_offset: 0

  - id: 3
    label: "챌린지 3"
    duration_seconds: 30
    music_file: null
    music_start_offset: 0

  - id: 4
    label: "챌린지 4"
    duration_seconds: 30
    music_file: null
    music_start_offset: 0
