server:
  host: "0.0.0.0"
  port: 8002
  storage_path: "./storage"
  frontend_dist: "../frontend/dist"

# Booth 2 = 오브제 수음 — Galaxy Pad internal mic records sound of
# physical objects (bell, rustling paper) being touched. Fixed 30s.
# R2 keys are prefixed with booth-2/ inside the shared bucket.
booth:
  id: 2
  name: "objects"

session:
  counter_file: "./storage/counter.json"

# music_file stays null — audio = live mic capture on the Galaxy Pad.
formats:
  - id: 1
    label: "오브제 챌린지"
    duration_seconds: 30
    music_file: null
    music_start_offset: 0
